name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: diplomacy
          POSTGRES_PASSWORD: diplomacy
          POSTGRES_DB: diplomacy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U diplomacy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: backend
        run: ./gradlew build -x test

      - name: Test
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: diplomacy
          DB_USER: diplomacy
          DB_PASSWORD: diplomacy
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: ./gradlew test

  adjudication:
    name: Adjudication Engine (Build & DATC Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: adjudication
        run: ./gradlew build -x test

      - name: Run DATC Tests
        working-directory: adjudication
        run: ./gradlew test

  ios:
    name: iOS (Build for Simulator)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build for simulator
        working-directory: ios
        run: |
          xcodebuild build \
            -project Diplomacy.xcodeproj \
            -scheme Diplomacy \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
